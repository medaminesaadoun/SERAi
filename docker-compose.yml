version: '3.9'

services:
  backend:
    build: ./backend
    container_name: serai-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - serai-pdfs:/app/pdfs
      - serai-db:/app
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: serai-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  serai-pdfs:
  serai-db:
